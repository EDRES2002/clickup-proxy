<!DOCTYPE html>
<html>
<head>
<title>ClickUp AI Project Manager</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui; }
body { background: #f5f5f5; padding: 2rem; }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
p { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
.card { background: white; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1.5rem; margin-bottom: 1rem; }
input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
button { background: #185FA5; color: white; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; }
button:hover { background: #0C447C; }
button:disabled { opacity: 0.5; }
.status { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }
.loading { background: #f0f0f0; color: #666; }
.success { background: #EAF3DE; color: #3B6D11; }
.error { background: #FCEBEB; color: #A32D2D; }
.metrics { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 1.5rem; }
.metric { background: #f9f9f9; border-radius: 8px; padding: 1rem; }
.metric .lbl { font-size: 13px; color: #888; }
.metric .val { font-size: 24px; font-weight: 600; }
.ticket { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
.ticket-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 6px; font-weight: 500; display: inline-block; margin-right: 6px; }
.p-urgent { background: #FCEBEB; color: #A32D2D; }
.p-high { background: #FAEEDA; color: #854F0B; }
.p-normal { background: #E6F1FB; color: #185FA5; }
.p-low { background: #EAF3DE; color: #3B6D11; }
.ai-box { background: #f9f9f9; border-radius: 8px; padding: 10px 14px; margin-top: 10px; font-size: 13px; }
.ai-box .summary { margin-bottom: 8px; color: #333; }
.ai-timeline { display: flex; gap: 20px; margin-bottom: 8px; }
.tl-lbl { font-size: 11px; color: #999; }
.tl-val { font-size: 13px; font-weight: 600; }
.followup { background: #E6F1FB; border-radius: 6px; padding: 8px 12px; color: #0C447C; font-size: 13px; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ddd; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; }
.tab { padding: 7px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid #ddd; background: white; width: auto; color: #666; }
.tab.active { background: #185FA5; color: white; border-color: #185FA5; }
.report-box { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; line-height: 1.8; font-size: 14px; }
</style>
</head>
<body>
<h1>ClickUp AI Project Manager</h1>
<p>Powered by Claude — daily ticket analysis and smart timelines</p>

<div class="card" id="setup">
  <label style="font-size:13px;color:#666;display:block;margin-bottom:6px">ClickUp API key</label>
  <input type="password" id="api-key" placeholder="pk_••••••••••••" />
  <button id="connect-btn" onclick="connect()">Connect & fetch tickets</button>
  <p style="font-size:12px;color:#999;margin-top:10px;margin-bottom:0">Your key is only used to call ClickUp — never stored.</p>
</div>

<div id="status-area"></div>
<div id="dashboard" style="display:none">
  <div class="metrics" id="metrics"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('tickets')">Tickets & timelines</button>
    <button class="tab" onclick="switchTab('followup')">Today's follow-up</button>
  </div>
  <div id="tab-tickets"><div id="tickets-list"></div></div>
  <div id="tab-followup" style="display:none"><div id="followup-content"></div></div>
</div>

<script>
let tickets = [];

function switchTab(tab) {
  document.getElementById('tab-tickets').style.display = tab==='tickets'?'block':'none';
  document.getElementById('tab-followup').style.display = tab==='followup'?'block':'none';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='tickets')||(i===1&&tab==='followup')));
  if(tab==='followup'&&tickets.length) generateFollowUp();
}

function setStatus(msg,type){ document.getElementById('status-area').innerHTML=msg?`<div class="status ${type}">${msg}`:''; }

async function connect() {
  const key = document.getElementById('api-key').value.trim();
  if(!key){ setStatus('Please enter your API key.','error'); return; }
  const btn = document.getElementById('connect-btn');
  btn.disabled=true; btn.textContent='Connecting...';
  setStatus('Connecting to ClickUp...','loading');
  try {
    const tr = await fetch('/team', { headers: {'x-api-key': key} });
    const td = await tr.json();
    if(td.err) throw new Error(td.err);
    const teamId = td.teams?.[0]?.id;
    if(!teamId) throw new Error('No team found.');
    setStatus('Fetching tasks...','loading');
    const taskr = await fetch(`/tasks/${teamId}`, { headers: {'x-api-key': key} });
    const taskd = await taskr.json();
    if(taskd.err) throw new Error(taskd.err);
    tickets = (taskd.tasks||[]).slice(0,20);
    setStatus(`Connected! Found ${tickets.length} tickets.`,'success');
    document.getElementById('setup').style.display='none';
    renderDashboard(tickets);
    analyzeAll();
  } catch(e) {
    setStatus('Error: '+e.message,'error');
    btn.disabled=false; btn.textContent='Connect & fetch tickets';
  }
}

function renderDashboard(tasks) {
  document.getElementById('dashboard').style.display='block';
  const open=tasks.filter(t=>!['complete','closed'].includes(t.status?.status?.toLowerCase())).length;
  const urgent=tasks.filter(t=>t.priority?.priority==='urgent').length;
  const overdue=tasks.filter(t=>t.due_date&&parseInt(t.due_date)<Date.now()).length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="lbl">Total</div><div class="val">${tasks.length}</div></div>
    <div class="metric"><div class="lbl">Open</div><div class="val">${open}</div></div>
    <div class="metric"><div class="lbl">Urgent</div><div class="val">${urgent}</div></div>
    <div class="metric"><div class="lbl">Overdue</div><div class="val">${overdue}</div></div>`;
  document.getElementById('tickets-list').innerHTML = tasks.length
    ? tasks.map(t=>ticketCard(t)).join('')
    : '<p style="text-align:center;padding:2rem;color:#999">No open tickets found.</p>';
}

function ticketCard(t) {
  const p=t.priority?.priority||'normal';
  const due=t.due_date?new Date(parseInt(t.due_date)).toLocaleDateString():'—';
  return `<div class="ticket" id="card-${t.id}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div class="ticket-name">${esc(t.name)}</div>
      <span class="badge p-${p==='normal'?'normal':p}">${p}</span>
    </div>
    <div style="font-size:12px;color:#999;margin-bottom:6px">Due: ${due} · ${t.status?.status||'open'}</div>
    <div class="ai-box" id="ai-${t.id}"><span class="spinner"></span> Analyzing...</div>
  </div>`;
}

async function analyzeAll(){ for(const t of tickets) await analyzeTicket(t); }

async function analyzeTicket(task) {
  const el=document.getElementById(`ai-${task.id}`);
  if(!el) return;
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`Analyze this ClickUp ticket and respond ONLY with JSON (no markdown):
{"estimate_days":number,"suggested_deadline":"YYYY-MM-DD","risk":"low"|"medium"|"high","followup":"standup question","summary":"one sentence"}
Ticket: ${task.name}
Priority: ${task.priority?.priority||'normal'}
Status: ${task.status?.status||'open'}
Description: ${(task.description||'').substring(0,300)||'none'}
Today: ${new Date().toISOString().split('T')[0]}`}]})
    });
    const data=await res.json();
    const text=data.content?.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const p=JSON.parse(text);
    const rc={low:'#3B6D11',medium:'#854F0B',high:'#A32D2D'}[p.risk]||'#185FA5';
    el.innerHTML=`<div class="summary">${esc(p.summary)}</div>
      <div class="ai-timeline">
        <div><div class="tl-lbl">Estimate</div><div class="tl-val">${p.estimate_days} days</div></div>
        <div><div class="tl-lbl">Deadline</div><div class="tl-val">${p.suggested_deadline}</div></div>
        <div><div class="tl-lbl">Risk</div><div class="tl-val" style="color:${rc}">${p.risk}</div></div>
      </div>
      <div class="followup">Follow-up: ${esc(p.followup)}</div>`;
  } catch(e){ el.innerHTML='Could not analyze.'; }
}

async function generateFollowUp() {
  const el=document.getElementById('followup-content');
  el.innerHTML='<div style="padding:2rem;text-align:center"><span class="spinner"></span> Generating report...</div>';
  const today=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const summary=tickets.slice(0,15).map(t=>`- [${t.priority?.priority||'normal'}] ${t.name} | ${t.status?.status||'open'} | due: ${t.due_date?new Date(parseInt(t.due_date)).toLocaleDateString():'none'}`).join('\n');
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`You are a technical project manager. Today is ${today}. Write a concise daily follow-up (no markdown, under 200 words): what to complete today, tickets at risk, team priorities.\n\nTickets:\n${summary}`}]})
    });
    const data=await res.json();
    const text=data.content?.map(c=>c.text||'').join('')||'No report.';
    el.innerHTML=`<div class="report-box"><div style="font-size:12px;color:#999;margin-bottom:10px">${today}</div>${esc(text)}</div>`;
  } catch(e){ el.innerHTML='<p style="color:#999">Could not generate report.</p>'; }
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
